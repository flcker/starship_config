# # palette й…ҚзҪ®и°ғиүІжқҝ
# # Use the color palette
palette = 'default'

[palettes.default]
# format specific color
primary = "#40c4ff"      # зӣ®еҪ•дё»иүІ
error = "#ad1457"        # е‘Ҫд»Өж—¶й•ҝ/й”ҷиҜҜ
info = "#00b0ff"         # OSдҝЎжҒҜ
success = "#007b43"      # ж—¶й—ҙ/жҲҗеҠҹ
user = "#ecd452"         # з”ЁжҲ·еҗҚ
# е…¶д»–йўңиүІ
background = "#DA627D"   # зӣ®еҪ•иғҢжҷҜиүІ
foreground = "#ffffff"   # е…¶д»–ж–Үжң¬йўңиүІ
success_green = "#00ff00"  # жҲҗеҠҹз¬ҰеҸ·иүІ
error_red = "#ff0000"      # й”ҷиҜҜз¬ҰеҸ·иүІ
red = "#ff0000"            # зәҜзәўиүІ
blue = "#0000ff"
yellow = "#ffff00"
magenta = "#ff00ff"
cyan = "#00ffff"
white = "#ffffff"
black = "#000000"


# Replace the 'вқҜ'symbol in the prompt with 'вһң'
[character] # The name of the module we are configuring is 'character'
# success_symbol = '[ у°ҳ§](italic green)'
success_symbol = '[ у°ҳ§](bold green)'
error_symbol = "[ О»](bold red)"
format = '[$symbol$success_symbol$error_symbol ]($style)' # The 'format'is being set to '[ $symbol$success_symbol]($style)'

[directory]
# style = "bg:#DA627D"
style = "bold fg:primary"
# format = ' [оӘғ $path]($style)'
format = " [о«· $path]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"~" = "пҖ• "
"Desktop" = "п„Ҳ "
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Musics" = "пҖҒ "
"Pictures" = "пҖҫ "
"Videos" = "пҖҪ "

################################################################################
# [key]еӯҳеңЁеҶІзӘҒзҡ„йңҖиҰҒеҗҲе№¶
# symbol: Nerd Font Symbols Preset (Nerdеӯ—дҪ“з¬ҰеҸ·йў„и®ҫ https://starship.rs/config/#nerd-font-symbols) 
# format: Bracketed Segments Preset (жӢ¬еҸ·ж®өйў„и®ҫ https://starship.rs/config/#bracketed-segments)
# жҢүkey жҺ’еәҸ [A~Z] [a~z] [0~9] [е…¶д»–]  

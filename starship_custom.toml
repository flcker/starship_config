# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# timeout settings
command_timeout = 10000  # 设置超时时间为10秒
scan_timeout = 1000  # 单位是毫秒，这里设为 1000ms

# Inserts a blank line between shell prompts
add_newline = true

# format = '$all'
# 相当于
format = """
$time\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$gleam\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$direnv\
$env_var\
$crystal\
$custom\
$sudo\
$jobs\
$battery\
$status\
$container\
$shell\
$cmd_duration\
$line_break\
$os\
$character"""

# # palette 配置调色板
# # Use the color palette
palette = 'default'

[palettes.default]
# format specific color
primary = "#40c4ff"      # 目录主色
error = "#ad1457"        # 命令时长/错误
info = "#00b0ff"         # OS信息
success = "#007b43"      # 时间/成功
user = "#ecd452"         # 用户名
# 其他颜色
background = "#DA627D"   # 目录背景色
foreground = "#ffffff"   # 其他文本颜色
success_green = "#00ff00"  # 成功符号色
error_red = "#ff0000"      # 错误符号色
red = "#ff0000"            # 纯红色
blue = "#0000ff"
yellow = "#ffff00"
magenta = "#ff00ff"
cyan = "#00ffff"
white = "#ffffff"
black = "#000000"


# Replace the '❯'symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
# success_symbol = '[ 󰘧](italic green)'
success_symbol = '[ 󰘧](bold green)'
error_symbol = "[ λ](bold red)"
format = '[$symbol$success_symbol$error_symbol ]($style)' # The 'format'is being set to '[ $symbol$success_symbol]($style)'

[directory]
# style = "bg:#DA627D"
style = "bold fg:primary"
# format = ' [ $path]($style)'
format = " [ $path]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"~" = " "
"Desktop" = " "
"Documents" = "󰈙 "
"Downloads" = " "
"Musics" = " "
"Pictures" = " "
"Videos" = " "

################################################################################
# [key]存在冲突的需要合并
# symbol: Nerd Font Symbols Preset (Nerd字体符号预设 https://starship.rs/config/#nerd-font-symbols)
# format: Bracketed Segments Preset (括号段预设 https://starship.rs/config/#bracketed-segments)
# 按key 排序 [A~Z] [a~z] [0~9] [其他]
[aws]
symbol = "  "
format = '[ $symbol($profile)(\($region\))( $duration)]($style)'

[buf]
symbol = " "

[bun]
format = '[ $symbol($version)]($style)'

[c]
symbol = " "
format = '[ $symbol($version(-$name))]($style)'
disabled = true

[cmake]
format = '[ $symbol($version)]($style)'

[cmd_duration]
style = "italic fg:error"
format = '[ 󱎫 $duration]($style)'
show_milliseconds = true
disabled = false
min_time = 10

[cobol]
format = '[ $symbol($version)]($style)'

[conda]
symbol = " "
format = '[ $symbol$environment]($style)'

[crystal]
symbol = " "
format = '[ $symbol($version)]($style)'

[daml]
format = '[ $symbol($version)]($style)'

[dart]
symbol = " "
format = '[ $symbol($version)]($style)'

[deno]
format = '[ $symbol($version)]($style)'

[docker_context]
symbol = " "
format = '[ $symbol$context]($style)'

[dotnet]
format = '[ $symbol($version)(🎯 $tfm)]($style)'

[elixir]
symbol = " "
format = '[ $symbol($version \(OTP $otp_version\))]($style)'

[elm]
symbol = " "
format = '[ $symbol($version)]($style)'

[erlang]
format = '[ $symbol($version)]($style)'

[fennel]
symbol = " "
format = '[ $symbol($version)]($style)'

[fossil_branch]
symbol = " "
format = '[ $symbol$branch]($style)'

[gcloud]
format = '[ $symbol$account(@$domain)(\($region\))]($style)'

[git_branch]
symbol = " "
format = '[ $symbol$branch]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'

[git_status]
# symbol = "󰏗 "
format = '([ $all_status$ahead_behind]($style))'
conflicted = "conflicted ⚔ "
untracked = " 🚧 "
stashed = "[${count}] "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = "✓ "

[git_commit]
tag_symbol = ' '
format = '([ $hash$tag_symbol$tag]($style))'
commit_hash_length = 6

[golang]
symbol = " "
format = '[ $symbol($version)]($style)'

[gradle]
symbol = " "
format = '[ $symbol($version)]($style)'

[guix_shell]
symbol = " "
format = '[ $symbol]($style)'

[haskell]
symbol = " "
format = '[ $symbol($version)]($style)'

[haxe]
symbol = " "
format = '[ $symbol($version)]($style)'

[helm]
format = '[ $symbol($version)]($style)'

[hg_branch]
symbol = " "
format = '[ $symbol$branch]($style)'

[hostname]
ssh_symbol = " "

[java]
symbol = " "
format = '[ $symbol($version)]($style)'

[julia]
symbol = " "
format = '[ $symbol($version)]($style)'

[kotlin]
symbol = " "
format = '[ $symbol($version)]($style)'

[kubernetes]
format = '[ $symbol$context( \($namespace\))]($style)'

[line_break]
disabled = false

[lua]
symbol = " "
format = '[ $symbol($version)]($style)'

[memory_usage]
symbol = "󰍛 "
format = '$symbol[$ram( | $swap)]($style)'

[meson]
symbol = "󰔷 "
format = '[ $symbol$project]($style)'

[nim]
symbol = "󰆥 "
format = '[ $symbol($version)]($style)'

[nix_shell]
symbol = " "
format = '[ $symbol$state( \($name\))]($style)'

[nodejs]
symbol = " "
format = '[ $symbol($version)]($style)'

[ocaml]
symbol = " "
format = '[ $symbol($version)(\($switch_indicator$switch_name\))]($style)'

[opa]
format = '[ $symbol($version)]($style)'

[openstack]
format = '[ $symbol$cloud(\($project\))]($style)'

[os]
disabled = false # Disabled by default
format = '[$symbol]($style)'
style = "bold fg:info"


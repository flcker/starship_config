"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 10000
scan_timeout = 1000
add_newline = true

format = """
[](red)\
$os\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
$c\
$cpp\
$cmake\
$rust\
$golang\
$nodejs\
$bun\
$deno\
$php\
$java\
$kotlin\
$gradle\
$haskell\
$haxe\
$python\
$ruby\
$lua\
$swift\
$zig\
$scala\
$dart\
$elixir\
$elm\
$julia\
$perl\
$ocaml\
$nim\
$crystal\
$rlang\
$fennel\
[](fg:green bg:sapphire)\
$docker_context\
$nix_shell\
$conda\
[](fg:sapphire bg:lavender)\
$time\
[](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'tokyonight'

# ── OS ────────────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
CachyOS = " "
Elementary = " "
Garuda = "󰛓 "
InstantOS = "󰔚 "
Nobara = " "
Zorin = " "


# ── Username ──────────────────────────────────────────────────────────────────
[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"~" = " "
"Desktop" = " "
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Video" = " "
"Pictures" = " "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bg:yellow"
format = '[[ $symbol$branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[git_commit]
tag_symbol = '  '

# ── Languages（绿色块，按 nerdfontsymbols 符号）────────────────────────────────
[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[cpp]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[cmake]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "󱘗 "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[nodejs]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[deno]
